<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>浦浦荐逼 - 管理后台</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<style>
body.admin-page{background:#0A0A1A;padding:16px;font-family:"Noto Sans SC",sans-serif;color:#F0F0FF;min-height:100vh}
.admin-page .admin-container{max-width:1200px;margin:0 auto}
.admin-page h1{font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#F5E600,#FF0066);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.admin-page .admin-sub{color:#605080;font-size:12px;margin-bottom:20px}
.admin-page .admin-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.admin-page .admin-toolbar .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;border:none;transition:all .2s}
.admin-page .btn-primary{background:linear-gradient(135deg,#F5E600,#FFD700);color:#0A0A1A}
.admin-page .btn-primary:hover{box-shadow:0 0 16px rgba(245,230,0,.4)}
.admin-page .btn-danger{background:rgba(255,0,102,.15);color:#FF0066;border:1px solid rgba(255,0,102,.3)}
.admin-page .btn-danger:hover{background:rgba(255,0,102,.25)}
.admin-page .btn-cyan{background:rgba(0,229,255,.15);color:#00E5FF;border:1px solid rgba(0,229,255,.3)}
.admin-page .btn-cyan:hover{background:rgba(0,229,255,.25)}
.admin-page .btn-outline{background:rgba(124,77,255,.1);color:#9890B8;border:1px solid rgba(124,77,255,.2)}
.admin-page .btn-outline:hover{background:rgba(124,77,255,.2)}
.admin-page .admin-table-wrap{overflow-x:auto;background:rgba(18,3,56,.6);border-radius:12px;border:1px solid rgba(124,77,255,.08);margin-bottom:16px}
.admin-page table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
.admin-page th{padding:12px 14px;text-align:left;font-size:11px;font-weight:600;color:#605080;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(124,77,255,.1);background:rgba(124,77,255,.04)}
.admin-page td{padding:10px 14px;border-bottom:1px solid rgba(124,77,255,.04);color:#9890B8}
.admin-page tr:hover td{background:rgba(124,77,255,.04)}
.admin-page .admin-actions{display:flex;gap:4px}
.admin-page .admin-btn{padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.admin-page .admin-btn.edit{background:rgba(0,229,255,.12);color:#00E5FF}
.admin-page .admin-btn.edit:hover{background:rgba(0,229,255,.2)}
.admin-page .admin-btn.toggle{background:rgba(245,230,0,.12);color:#F5E600}
.admin-page .admin-btn.toggle:hover{background:rgba(245,230,0,.2)}
.admin-page .admin-btn.delete{background:rgba(255,0,102,.12);color:#FF0066}
.admin-page .admin-btn.delete:hover{background:rgba(255,0,102,.2)}
.admin-page #cloudMsg{display:none;padding:10px 14px;margin-bottom:12px;border-radius:8px;font-size:13px;font-weight:600;background:rgba(0,229,255,.08);color:#00E5FF;border:1px solid rgba(0,229,255,.15)}
.admin-page .cloud-section{background:rgba(18,3,56,.6);border-radius:12px;border:1px solid rgba(124,77,255,.08);padding:16px;margin-bottom:16px}
.admin-page .cloud-section h3{font-size:13px;font-weight:700;margin-bottom:10px;color:#00E5FF}
.admin-page .cloud-section h3 i{margin-right:6px}
.admin-page .cloud-btns{display:flex;gap:8px;flex-wrap:wrap}
.admin-page .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:5000;display:none;align-items:center;justify-content:center;padding:16px}
.admin-page .modal-overlay.open{display:flex}
.admin-page .modal-content{background:#120338;border-radius:16px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;padding:24px;border:1px solid rgba(124,77,255,.15)}
.admin-page .modal-content h2{font-size:18px;font-weight:800;margin-bottom:16px;color:#F0F0FF}
.admin-page .form-group{margin-bottom:12px}
.admin-page .form-group label{display:block;font-size:12px;font-weight:600;color:#605080;margin-bottom:4px}
.admin-page .form-group input,.admin-page .form-group select,.admin-page .form-group textarea{width:100%;padding:9px 12px;font-size:13px;border-radius:8px;background:rgba(124,77,255,.06);border:1px solid rgba(124,77,255,.1);color:#F0F0FF;outline:none;transition:all .2s}
.admin-page .form-group input:focus,.admin-page .form-group select:focus,.admin-page .form-group textarea:focus{border-color:#00E5FF;box-shadow:0 0 8px rgba(0,229,255,.1)}
.admin-page .form-group textarea{resize:vertical;min-height:60px}
.admin-page .form-group select option{background:#120338;color:#F0F0FF}
.admin-page .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.admin-page .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.admin-page .modal-actions button{padding:9px 20px;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;border:none;transition:all .2s}
.admin-page .modal-actions .save-btn{background:linear-gradient(135deg,#F5E600,#FFD700);color:#0A0A1A}
.admin-page .modal-actions .save-btn:hover{box-shadow:0 0 16px rgba(245,230,0,.4)}
.admin-page .modal-actions .cancel-btn{background:rgba(124,77,255,.1);color:#9890B8}
.admin-page .modal-actions .cancel-btn:hover{color:#fff}
.admin-page .photo-url-row{display:flex;gap:6px;margin-bottom:6px}
.admin-page .photo-url-row input{flex:1;padding:7px 10px;font-size:12px;border-radius:6px;background:rgba(124,77,255,.06);border:1px solid rgba(124,77,255,.1);color:#F0F0FF;outline:none}
.admin-page .photo-url-row input:focus{border-color:#FF0066}
.admin-page .photo-remove-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(255,0,102,.12);color:#FF0066;border:none;cursor:pointer;font-size:12px}
.admin-page .photo-remove-btn:hover{background:rgba(255,0,102,.25)}
.admin-page .photo-add-btn{padding:7px 14px;font-size:12px;font-weight:600;border-radius:6px;background:rgba(0,229,255,.12);color:#00E5FF;border:1px solid rgba(0,229,255,.2);cursor:pointer;transition:all .2s;margin-top:4px}
.admin-page .photo-add-btn:hover{background:rgba(0,229,255,.2)}
.admin-page .upload-local-btn{padding:7px 14px;font-size:12px;font-weight:600;border-radius:6px;background:rgba(245,230,0,.12);color:#F5E600;border:1px solid rgba(245,230,0,.2);cursor:pointer;transition:all .2s;margin-top:4px;margin-left:6px}
.admin-page .upload-local-btn:hover{background:rgba(245,230,0,.2)}
.admin-page .admin-search{display:flex;gap:8px;margin-bottom:0;flex:1}
.admin-page .admin-search input{flex:1;padding:9px 12px;font-size:13px;border-radius:8px;background:rgba(124,77,255,.06);border:1px solid rgba(124,77,255,.1);color:#F0F0FF;outline:none;max-width:280px}
.admin-page .admin-search input:focus{border-color:#00E5FF}
@media(max-width:640px){
.admin-page .form-row{grid-template-columns:1fr}
.admin-page .admin-toolbar{gap:6px}
.admin-page .admin-toolbar .btn{font-size:12px;padding:7px 12px}
}
</style>
</head>
<body class="admin-page">
<div class="admin-container" id="adminBody">

<h1>⚙️ 浦浦荐逼 · 管理后台</h1>
<p class="admin-sub">老师数据管理 · 云端同步 · 导入导出</p>

<div class="admin-toolbar">
    <button class="btn btn-primary" id="addBtn"><i class="fas fa-plus"></i> 添加老师</button>
    <button class="btn btn-outline" id="exportBtn"><i class="fas fa-download"></i> 导出</button>
    <button class="btn btn-outline" id="importBtn"><i class="fas fa-upload"></i> 导入</button>
    <div style="flex:1"></div>
    <div class="admin-search"><input type="text" id="adminSearch" placeholder="🔍 搜索老师..."></div>
    <a href="index.html" class="btn btn-cyan" style="text-decoration:none" target="_blank"><i class="fas fa-external-link-alt"></i> 预览前台</a>
</div>

<div id="cloudMsg"></div>

<div class="admin-table-wrap">
<table>
<thead><tr><th>花名</th><th>TG账号</th><th>区域</th><th>价格</th><th>状态</th><th>照片</th><th>操作</th></tr></thead>
<tbody id="adminTableBody"><tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-muted)"><i class="fas fa-spinner fa-spin" style="font-size:20px;display:block;margin-bottom:8px"></i>加载中...</td></tr></tbody>
</table>
</div>

<div class="cloud-section">
<h3><i class="fas fa-cloud-upload-alt"></i> 云端同步 (JSONBin.io)</h3>
<div class="cloud-btns">
    <button class="btn btn-cyan" id="pushBtn"><i class="fas fa-cloud-upload-alt"></i> 推送到云端</button>
    <button class="btn btn-cyan" id="pullBtn"><i class="fas fa-cloud-download-alt"></i> 从云端拉取</button>
    <button class="btn btn-outline" id="proxyBtn"><i class="fas fa-plug"></i> 测试代理连接</button>
</div>
</div>

<div class="cloud-section" style="background:rgba(245,230,0,.04);border-color:rgba(245,230,0,.1)">
<h3 style="color:var(--gold)"><i class="fas fa-lightbulb"></i> 使用说明</h3>
<ul style="font-size:12px;color:var(--text-secondary);line-height:2;padding-left:16px;margin:0">
<li>添加老师 → 填写信息 → 保存，数据自动保存到浏览器本地</li>
<li>推送到云端 → 把当前数据上传到 JSONBin，所有设备共享</li>
<li>从云端拉取 → 下载云端最新数据覆盖本地</li>
<li>导出 → 下载 JSON 文件备份；导入 → 粘贴 JSON 数据恢复</li>
<li>后台访问方式：在浏览器地址栏输入 <code style="background:rgba(124,77,255,.1);padding:2px 6px;border-radius:4px">你的域名/admin.html</code></li>
</ul>
</div>

</div>

<div class="modal-overlay" id="editorModal">
<div class="modal-content">
<h2 id="editorTitle">添加老师</h2>

<div class="form-row">
    <div class="form-group"><label>花名 *</label><input type="text" id="teacherName" placeholder="如：小美"></div>
    <div class="form-group"><label>TG账号</label><input type="text" id="teacherTG" placeholder="如：xiaomei_cd"></div>
</div>

<div class="form-row">
    <div class="form-group"><label>区域</label>
        <select id="teacherDistrict">
            <option value="锦江区">锦江区</option>
            <option value="青羊区">青羊区</option>
            <option value="成华区">成华区</option>
            <option value="武侯区">武侯区</option>
            <option value="金牛区">金牛区</option>
            <option value="高新区">高新区</option>
            <option value="龙泉驿区">龙泉驿区</option>
            <option value="温江区">温江区</option>
            <option value="郫都区">郫都区</option>
            <option value="新都区">新都区</option>
            <option value="双流区">双流区</option>
        </select>
    </div>
    <div class="form-group"><label>价格 (¥)</label><input type="number" id="teacherPrice" placeholder="如：1000"></div>
</div>

<div class="form-row">
    <div class="form-group"><label>状态</label>
        <select id="teacherStatus">
            <option value="营业中">🟢 营业中</option>
            <option value="休息中">🔴 休息中</option>
        </select>
    </div>
    <div class="form-group"><label>开课时间</label><input type="text" id="teacherSchedule" placeholder="如：10:00-22:00"></div>
</div>

<div class="form-group"><label>优惠信息</label><input type="text" id="teacherDiscount" placeholder="如：首单8折"></div>

<div class="form-group"><label>简介</label><textarea id="teacherBio" placeholder="老师简介..."></textarea></div>

<div class="form-group"><label>标签（逗号分隔）</label><input type="text" id="teacherTags" placeholder="御姐, 嫩妹, 少妇, BBW"></div>

<div class="form-group">
    <label>照片链接（最多10张）</label>
    <div id="photoUrlsContainer"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
        <button class="photo-add-btn" id="addPicBtn"><i class="fas fa-plus"></i> 添加网址</button>
        <button class="upload-local-btn" id="uploadPicBtn"><i class="fas fa-file-image"></i> 本地上传</button>
    </div>
    <input type="file" id="picInput" accept="image/*" style="display:none">
</div>

<div class="modal-actions">
    <button class="cancel-btn" id="editorCancel">取消</button>
    <button class="save-btn" id="editorSave">💾 保存</button>
</div>
</div>
</div>

<script src="config.js"></script>
<script src="cloud.js"></script>
<script src="app.js"></script>
</body>
</html>
