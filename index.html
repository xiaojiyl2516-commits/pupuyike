<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>浦浦荐逼</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="nav-brand"><span class="brand-icon">✦</span><span class="brand-text">浦浦荐逼</span></div>
    <div class="nav-links" id="navLinks">
        <a href="#" class="nav-link active" data-filter="all">全部</a>
        <a href="#" class="nav-link" data-filter="锦江区">锦江</a>
        <a href="#" class="nav-link" data-filter="青羊区">青羊</a>
        <a href="#" class="nav-link" data-filter="成华区">成华</a>
        <a href="#" class="nav-link" data-filter="武侯区">武侯</a>
        <a href="#" class="nav-link" data-filter="金牛区">金牛</a>
        <a href="#" class="nav-link" data-filter="高新区">高新</a>
    </div>
    <div class="nav-actions">
        <button class="icon-btn" id="checkinBtn" title="签到"><i class="fas fa-calendar-check"></i></button>
        <button class="icon-btn" id="searchToggle"><i class="fas fa-search"></i></button>
        <button class="icon-btn" id="filterToggle"><i class="fas fa-sliders-h"></i></button>
        <a href="https://t.me/pupu25122512" target="_blank" class="tg-nav-btn"><i class="fab fa-telegram-plane"></i></a>
    </div>
</nav>

<div class="search-bar" id="searchBar">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" placeholder="搜索老师...">
    <button class="icon-btn search-close" id="searchClose"><i class="fas fa-times"></i></button>
</div>

<div class="filter-panel" id="filterPanel">
    <div class="filter-section"><h4>标签</h4><div class="tag-filters" id="tagFilters"><span class="filter-tag active" data-tag="all">全部</span></div></div>
    <div class="filter-section"><h4>价格</h4><div class="price-range"><input type="number" id="priceMin" placeholder="最低"><span class="price-sep">—</span><input type="number" id="priceMax" placeholder="最高"><button class="btn-sm" id="priceFilterBtn">确定</button></div></div>
    <div class="filter-section"><h4>状态</h4><div class="status-filters"><label><input type="radio" name="status" value="all" checked> 全部</label><label><input type="radio" name="status" value="营业中"> 营业中</label><label><input type="radio" name="status" value="休息中"> 休息中</label></div></div>
</div>

<div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
        <h1 class="hero-title" data-text="浦浦荐逼">浦浦荐逼</h1>
        <p class="hero-subtitle">帮你精准筛出可去的好逼</p>
        <div class="hero-stats"><span id="teacherCount">0</span> 位老师在线</div>
    </div>
</div>

<section class="category-section">
    <div class="section-header"><h2 class="section-title">全部老师</h2><span class="section-badge" id="totalBadge">0</span></div>
    <div class="card-grid" id="cardGrid"></div>
</section>

<!-- 老师详情弹窗 -->
<div class="modal-overlay" id="teacherModal"><div class="modal-content">
    <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
    <div class="modal-gallery">
        <div class="gallery-main" id="galleryMain">
            <img src="" alt="" id="galleryImg">
            <button class="gallery-nav gallery-prev" id="galleryPrev"><i class="fas fa-chevron-left"></i></button>
            <button class="gallery-nav gallery-next" id="galleryNext"><i class="fas fa-chevron-right"></i></button>
            <div class="gallery-counter" id="galleryCounter">1/1</div>
        </div>
        <div class="gallery-thumbs" id="galleryThumbs"></div>
    </div>
    <div class="modal-info">
        <div class="modal-header"><h2 id="modalName">—</h2><span class="modal-tg"><i class="fab fa-telegram-plane"></i> @<span id="modalTG">—</span></span><span class="modal-status" id="modalStatus"></span></div>
        <div class="modal-tags" id="modalTags"></div>
        <div class="modal-detail-grid">
            <div class="detail-item"><span class="detail-label"><i class="fas fa-map-marker-alt"></i> 区域</span><span class="detail-value" id="modalDistrict">—</span></div>
            <div class="detail-item"><span class="detail-label"><i class="fas fa-tag"></i> 价格</span><span class="detail-value price" id="modalPrice">—</span></div>
            <div class="detail-item"><span class="detail-label"><i class="fas fa-clock"></i> 开课时间</span><span class="detail-value" id="modalSchedule">—</span></div>
            <div class="detail-item"><span class="detail-label"><i class="fas fa-gift"></i> 优惠</span><span class="detail-value" id="modalDiscount">—</span></div>
        </div>
        <div class="modal-section"><h4><i class="fas fa-info-circle"></i> 简介</h4><p id="modalBio">—</p></div>
        <div class="modal-section">
            <div class="review-header"><h4><i class="fas fa-comments"></i> 评价</h4><button class="btn-sm" id="addReviewBtn"><i class="fas fa-plus"></i> 写评价</button></div>
            <div id="reviewsList"></div>
        </div>
    </div>
</div></div>

<!-- 评价弹窗 -->
<div class="modal-overlay" id="reviewModal"><div class="modal-content" style="max-width:420px">
    <button class="modal-close" id="reviewClose" style="position:absolute;top:12px;right:12px;z-index:10;background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer"><i class="fas fa-times"></i></button>
    <div style="padding:20px"><h3 style="font-size:16px;font-weight:700;margin-bottom:10px">写评价</h3>
    <div class="rating-input" style="display:flex;align-items:center;gap:4px;margin:10px 0">
        <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span><span class="star" data-val="3">★</span><span class="star" data-val="4">★</span><span class="star" data-val="5">★</span>
        <span class="rating-text" id="ratingText" style="font-size:12px;color:var(--text-muted);margin-left:8px">点击评分</span>
    </div>
    <textarea id="reviewText" rows="3" style="width:100%;padding:8px 12px;background:rgba(124,77,255,0.06);border:1px solid rgba(124,77,255,0.1);border-radius:8px;color:#fff;font-size:13px;margin-bottom:8px;resize:vertical" placeholder="分享你的体验..."></textarea>
    <input id="reviewerName" style="width:100%;padding:8px 12px;background:rgba(124,77,255,0.06);border:1px solid rgba(124,77,255,0.1);border-radius:8px;color:#fff;font-size:13px;margin-bottom:8px" placeholder="你的昵称（选填）">
    <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="reviewCancel" style="padding:8px 16px;font-size:13px;font-weight:600;border-radius:8px;background:rgba(124,77,255,0.1);color:var(--text-secondary);border:none;cursor:pointer">取消</button>
        <button id="reviewSubmit" style="padding:8px 16px;font-size:13px;font-weight:600;border-radius:8px;background:var(--accent);color:#0A0A1A;border:none;cursor:pointer">提交评价</button>
    </div>
</div></div></div>

<!-- 签到弹窗 -->
<div class="modal-overlay" id="checkinModal"><div class="modal-content" style="max-width:400px">
    <button class="modal-close" id="chkClose"><i class="fas fa-times"></i></button>
    <div style="padding:20px;text-align:center">
        <div style="font-size:36px;margin-bottom:4px">🎯</div>
        <h2 style="font-size:17px;font-weight:800;margin-bottom:2px">签到中心</h2>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">每日签到，福利不断</p>
        <div id="chkRoles" style="display:flex;gap:10px">
            <div id="chkWolf" style="flex:1;padding:16px 12px;background:rgba(124,77,255,0.06);border:1px solid rgba(124,77,255,0.1);border-radius:12px;cursor:pointer">
                <div style="font-size:28px;margin-bottom:4px">🐺</div><div style="font-size:13px;font-weight:700">我是狼友</div><div style="font-size:11px;color:var(--text-muted)">赚积分换优惠券</div>
            </div>
            <div id="chkTeacher" style="flex:1;padding:16px 12px;background:rgba(124,77,255,0.06);border:1px solid rgba(124,77,255,0.1);border-radius:12px;cursor:pointer">
                <div style="font-size:28px;margin-bottom:4px">👩‍🏫</div><div style="font-size:13px;font-weight:700">我是老师</div><div style="font-size:11px;color:var(--text-muted)">更新营业状态</div>
            </div>
        </div>
        <div id="chkWolfRes" style="display:none">
            <div style="font-size:40px;margin-bottom:6px">✅</div><h3 style="font-size:15px;font-weight:700;color:var(--accent);margin-bottom:2px">签到成功！</h3>
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:8px" id="wolfMsg">+1 积分</p>
            <div style="background:rgba(124,77,255,0.08);border-radius:10px;padding:10px;margin-bottom:6px">
                <div style="font-size:10px;color:var(--text-muted)">当前积分</div>
                <div style="font-size:24px;font-weight:800;color:var(--cyan)" id="wolfPts">0 分</div>
            </div>
            <button id="chkWolfDone" style="padding:8px 16px;font-size:12px;font-weight:600;border-radius:8px;background:var(--accent);color:#0A0A1A;border:none;cursor:pointer;width:100%;margin-top:6px">知道了</button>
        </div>
        <div id="chkTeacherRes" style="display:none">
            <h3 style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--cyan)">选择你的老师身份</h3>
            <div id="chkTeacherList" style="max-height:200px;overflow-y:auto;margin-bottom:8px"></div>
            <button id="chkTeacherBack" style="padding:6px 14px;font-size:12px;font-weight:600;border-radius:8px;background:rgba(124,77,255,0.1);color:var(--text-secondary);border:none;cursor:pointer;width:100%">返回</button>
        </div>
        <div id="chkTeacherDoneRes" style="display:none">
            <div style="font-size:40px;margin-bottom:6px">✅</div><h3 style="font-size:15px;font-weight:700;color:var(--cyan)">状态已更新！</h3>
            <p style="font-size:12px;color:var(--text-secondary);margin:4px 0 8px" id="chkTeacherMsg"></p>
            <button id="chkTeacherDone" style="padding:8px 16px;font-size:12px;font-weight:600;border-radius:8px;background:var(--cyan);color:#0A0A1A;border:none;cursor:pointer;width:100%">完成</button>
        </div>
    </div>
</div></div>

<script src="config.js"></script>
<script src="cloud.js"></script>
<script src="app.js"></script>
</body>
</html>
