<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>浦浦荐逼 · 赛博江湖</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <span class="brand-icon">✦</span>
            <span class="brand-text">浦浦荐逼</span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="#" class="nav-link active" data-filter="all">全部</a>
            <a href="#" class="nav-link" data-filter="锦江区">锦江</a>
            <a href="#" class="nav-link" data-filter="青羊区">青羊</a>
            <a href="#" class="nav-link" data-filter="成华区">成华</a>
            <a href="#" class="nav-link" data-filter="武侯区">武侯</a>
            <a href="#" class="nav-link" data-filter="金牛区">金牛</a>
            <a href="#" class="nav-link" data-filter="高新区">高新</a>
        </div>
        <div class="nav-actions">
            <button class="icon-btn" id="searchToggle"><i class="fas fa-search"></i></button>
            <button class="icon-btn" id="filterToggle"><i class="fas fa-sliders-h"></i></button>
        </div>
    </nav>

    <div class="search-bar" id="searchBar">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="搜索老师花名、标签、简介..." autocomplete="off">
        <button class="icon-btn search-close" id="searchClose"><i class="fas fa-times"></i></button>
    </div>

    <div class="filter-panel" id="filterPanel">
        <div class="filter-section">
            <h4>标签筛选</h4>
            <div class="tag-filters" id="tagFilters">
                <span class="filter-tag active" data-tag="all">全部</span>
            </div>
        </div>
        <div class="filter-section">
            <h4>价格区间</h4>
            <div class="price-range">
                <input type="number" id="priceMin" placeholder="最低价" min="0">
                <span class="price-sep">—</span>
                <input type="number" id="priceMax" placeholder="最高价" min="0">
                <button class="btn-sm" id="priceFilterBtn">确定</button>
            </div>
        </div>
        <div class="filter-section">
            <h4>开课状态</h4>
            <div class="status-filters">
                <label><input type="radio" name="status" value="all" checked> 全部</label>
                <label><input type="radio" name="status" value="营业中"> 营业中</label>
                <label><input type="radio" name="status" value="休息中"> 休息中</label>
            </div>
        </div>
    </div>

    <main class="main-content" id="mainContent">
        <section class="hero">
            <div class="hero-bg"></div>
            <div class="hero-content">
                <h1 class="hero-title" data-text="浦浦荐逼">浦浦荐逼</h1>
                <p class="hero-subtitle">成都 · 赛博江湖 · 私人伴游</p>
                <div class="hero-stats"><span id="teacherCount">0</span> 位老师在线</div>
            </div>
        </section>

        <section class="category-section">
            <div class="section-header">
                <h2 class="section-title">全部老师</h2>
                <span class="section-badge" id="totalBadge">0</span>
            </div>
            <div class="card-grid" id="cardGrid"></div>
        </section>
    </main>

    <!-- Teacher Detail Modal -->
    <div class="modal-overlay" id="teacherModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <div class="modal-gallery">
                <div class="gallery-main" id="galleryMain">
                    <img src="" alt="" id="galleryImg">
                    <button class="gallery-nav gallery-prev" id="galleryPrev"><i class="fas fa-chevron-left"></i></button>
                    <button class="gallery-nav gallery-next" id="galleryNext"><i class="fas fa-chevron-right"></i></button>
                    <div class="gallery-counter" id="galleryCounter">1 / 1</div>
                </div>
                <div class="gallery-thumbs" id="galleryThumbs"></div>
            </div>
            <div class="modal-info">
                <div class="modal-header">
                    <h2 id="modalName">—</h2>
                    <span class="modal-tg"><i class="fab fa-telegram-plane"></i> @<span id="modalTG">—</span></span>
                    <span class="modal-status" id="modalStatus">营业中</span>
                </div>
                <div class="modal-tags" id="modalTags"></div>
                <div class="modal-detail-grid">
                    <div class="detail-item"><span class="detail-label"><i class="fas fa-map-marker-alt"></i> 区域</span><span class="detail-value" id="modalDistrict">—</span></div>
                    <div class="detail-item"><span class="detail-label"><i class="fas fa-tag"></i> 价格</span><span class="detail-value price" id="modalPrice">—</span></div>
                    <div class="detail-item"><span class="detail-label"><i class="fas fa-clock"></i> 开课</span><span class="detail-value" id="modalSchedule">—</span></div>
                    <div class="detail-item"><span class="detail-label"><i class="fas fa-gift"></i> 优惠</span><span class="detail-value" id="modalDiscount">暂无</span></div>
                </div>
                <div class="modal-section">
                    <h4><i class="fas fa-file-alt"></i> 老师简介</h4>
                    <p id="modalBio">暂无简介</p>
                </div>
                <div class="modal-section">
                    <div class="review-header">
                        <h4><i class="fas fa-star"></i> 评价</h4>
                        <button class="btn-sm" id="addReviewBtn"><i class="fas fa-plus"></i> 写评价</button>
                    </div>
                    <div class="reviews-container" id="reviewsContainer"><p class="no-reviews">暂无评价</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal-content modal-sm">
            <h3>添加评价</h3>
            <div class="rating-input">
                <span class="star" data-val="1">★</span>
                <span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span>
                <span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
                <span class="rating-text" id="ratingText">点击评分</span>
            </div>
            <textarea id="reviewText" placeholder="分享你的体验..." rows="4"></textarea>
            <input type="text" id="reviewerName" placeholder="你的昵称（选填）">
            <div class="modal-actions">
                <button class="btn-cancel" id="reviewCancel">取消</button>
                <button class="btn-primary" id="reviewSubmit">提交评价</button>
            </div>
        </div>
    </div>

    <div class="checkin-banner" id="checkinBanner">
        <i class="fas fa-check-circle"></i>
        <span>已签到 — 今日开课状态已更新</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
